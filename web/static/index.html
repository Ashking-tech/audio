<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Fingerprint</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@400;500;600&display=swap');

:root {
  --bg: #faf8f5;
  --surface: #fffdf9;
  --border: #e8e2d8;
  --text: #2d2922;
  --text-secondary: #847a6c;
  --text-tertiary: #b0a597;
  --accent: #9a6b4b;
  --accent-hover: #855a3e;
  --accent-light: #f5ede6;
  --success: #6b8f5e;
  --error: #c44d4d;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  -webkit-font-smoothing: antialiased;
  position: relative;
  overflow-x: hidden;
}

.bg-notes {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bg-notes span {
  position: absolute;
  font-family: serif;
  color: var(--accent);
  opacity: 0;
  animation: floatNote linear infinite;
  animation-delay: calc(var(--d) * 1s);
  animation-duration: calc(var(--dur) * 1s);
  font-size: calc(var(--size) * 1rem);
  left: calc(var(--x) * 1%);
}

@keyframes floatNote {
  0% {
    opacity: 0;
    transform: translateY(100vh) rotate(0deg) scale(0.5);
  }
  10% {
    opacity: 0.25;
  }
  50% {
    opacity: 0.18;
  }
  90% {
    opacity: 0.25;
  }
  100% {
    opacity: 0;
    transform: translateY(-10vh) rotate(360deg) scale(1);
  }
}

.container {
  position: relative;
  z-index: 1;
  max-width: 480px;
  width: 100%;
  padding: 40px 20px;
}

header {
  margin-bottom: 32px;
  text-align: center;
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 2.5rem;
  font-style: italic;
  color: var(--accent);
  line-height: 1;
  margin-bottom: 8px;
  letter-spacing: -0.03em;
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.75rem;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}

.subtitle {
  color: var(--text-secondary);
  font-size: 0.875rem;
}

.tabs {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 0;
}

.tab {
  flex: 1;
  padding: 10px 12px;
  border: none;
  background: transparent;
  color: var(--text-tertiary);
  font-size: 0.8125rem;
  font-weight: 500;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
  transition: all 0.2s;
}

.tab.active {
  color: var(--text);
  border-bottom-color: var(--accent);
}

.tab:hover:not(.active) {
  color: var(--text-secondary);
}

.panel { display: none; }
.panel.active { display: block; }

/* Identify */
.identify-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 48px 28px 36px;
  text-align: center;
}

.listen-btn {
  width: 112px;
  height: 112px;
  border-radius: 50%;
  border: none;
  background: var(--accent-light);
  color: var(--accent);
  font-size: 0.875rem;
  cursor: pointer;
  transition: all 0.25s ease;
  margin: 0 auto 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 2px;
}

.listen-btn:hover {
  background: #edd9cc;
  transform: scale(1.04);
  box-shadow: 0 8px 24px rgba(154,107,75,0.15);
}

.listen-btn:active {
  transform: scale(0.97);
}

.listen-btn.recording {
  background: #f8e8e8;
  color: var(--error);
  animation: pulse 1.2s ease-in-out infinite;
}

.listen-btn .icon {
  font-size: 1.5rem;
  line-height: 1;
  pointer-events: none;
}

.listen-btn .label {
  font-size: 0.75rem;
  font-weight: 500;
  pointer-events: none;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(196,77,77,0.12); }
  50% { box-shadow: 0 0 0 16px rgba(196,77,77,0); }
}

.status {
  font-size: 0.8125rem;
  color: var(--text-secondary);
  min-height: 20px;
}

.status .spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  margin-right: 6px;
  vertical-align: middle;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.result-card {
  display: none;
  margin-top: 24px;
  padding: 20px;
  background: #f8f5f0;
  border-radius: var(--radius-sm);
  animation: fadeIn 0.3s ease;
}

.result-card.show { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.result-card .song-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem;
  font-weight: 400;
  margin-bottom: 4px;
}

.result-card .confidence {
  font-size: 0.8125rem;
  color: var(--success);
}

/* Upload */
.upload-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px;
}

.upload-area {
  border: 1.5px dashed var(--border);
  border-radius: var(--radius-sm);
  padding: 36px 16px;
  text-align: center;
  cursor: pointer;
  transition: all 0.25s ease;
  margin-bottom: 16px;
}

.upload-area:hover {
  border-color: var(--accent);
  background: #fcf9f6;
}

.upload-area .icon {
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.upload-area p {
  font-size: 0.8125rem;
  color: var(--text-secondary);
}

.upload-area .filename {
  font-family: 'DM Serif Display', serif;
  font-size: 1rem;
  color: var(--text);
  font-style: italic;
}

.upload-area input[type="file"] { display: none; }

#songName {
  width: 100%;
  padding: 12px 14px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-size: 0.875rem;
  font-family: 'Inter', sans-serif;
  outline: none;
  transition: border-color 0.2s;
}

#songName::placeholder {
  color: var(--text-tertiary);
}

#songName:focus {
  border-color: var(--accent);
}

.submit-btn {
  width: 100%;
  padding: 12px 16px;
  border: none;
  border-radius: var(--radius-sm);
  background: var(--accent);
  color: #fff;
  font-size: 0.875rem;
  font-weight: 500;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  margin-top: 12px;
  transition: all 0.2s ease;
}

.submit-btn:hover:not(:disabled) {
  background: var(--accent-hover);
  box-shadow: 0 4px 16px rgba(154,107,75,0.2);
}

.submit-btn:active:not(:disabled) {
  transform: scale(0.98);
}

.submit-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

#uploadStatus {
  margin-top: 14px;
  font-size: 0.8125rem;
  color: var(--text-secondary);
  min-height: 20px;
}

/* Library */
.library-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px 28px;
}

.library-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--border);
}

.library-header h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 0.9375rem;
  font-weight: 400;
  color: var(--text);
}

.refresh-btn {
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  color: var(--text-tertiary);
  font-size: 0.75rem;
  font-family: 'Inter', sans-serif;
  cursor: pointer;
  transition: all 0.2s;
}

.refresh-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.song-list {
  list-style: none;
}

.song-list li {
  padding: 12px 0;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 0.875rem;
  border-bottom: 1px solid #f0ebe4;
  transition: opacity 0.15s;
}

.song-list li:last-child {
  border-bottom: none;
}

.song-list li .num {
  color: var(--text-tertiary);
  font-size: 0.75rem;
  width: 24px;
  text-align: right;
  font-variant-numeric: tabular-nums;
}

.song-list li .name {
  font-weight: 450;
}

.empty-state {
  color: var(--text-tertiary);
  font-size: 0.8125rem;
  text-align: center;
  padding: 32px 0;
}

@media (max-width: 480px) {
  .container { padding: 24px 16px; }
  .logo { font-size: 2rem; }
  h1 { font-size: 1.5rem; }
  .identify-card { padding: 36px 20px 28px; }
  .listen-btn { width: 100px; height: 100px; }
  .upload-card { padding: 20px; }
}
</style>
</head>
<body>
<div class="bg-notes">
  <span style="--x:5; --size:1.2; --dur:18; --d:0;">♫</span>
  <span style="--x:15; --size:0.8; --dur:22; --d:3;">♪</span>
  <span style="--x:25; --size:1.4; --dur:16; --d:6;">♫</span>
  <span style="--x:35; --size:0.6; --dur:20; --d:1;">♪</span>
  <span style="--x:45; --size:1.0; --dur:24; --d:8;">♩</span>
  <span style="--x:55; --size:1.3; --dur:17; --d:4;">♫</span>
  <span style="--x:65; --size:0.7; --dur:21; --d:10;">♪</span>
  <span style="--x:75; --size:1.1; --dur:19; --d:2;">♩</span>
  <span style="--x:85; --size:0.9; --dur:23; --d:7;">♫</span>
  <span style="--x:92; --size:1.5; --dur:15; --d:5;">♪</span>
</div>

<div class="container">
  <header>
    <div class="logo">♫</div>
    <h1>Audio Fingerprint</h1>
    <p class="subtitle">Identify songs by sound</p>
  </header>

  <div class="tabs">
    <button class="tab active" data-tab="identify">Identify</button>
    <button class="tab" data-tab="library">Library</button>
    <button class="tab" data-tab="upload">Add Song</button>
  </div>

  <div class="panel active" id="panel-identify">
    <div class="identify-card">
      <button class="listen-btn" id="listenBtn">
        <span class="icon">🎵</span>
        <span class="label">Start Listening</span>
      </button>
      <div class="status" id="status">Tap the button to identify a song</div>
      <div class="result-card" id="resultCard">
        <div class="song-name" id="songNameResult"></div>
        <div class="confidence" id="confidenceResult"></div>
      </div>
    </div>
  </div>

  <div class="panel" id="panel-upload">
    <div class="upload-card">
      <div class="upload-area" id="uploadArea">
        <div class="icon">🎤</div>
        <p>Choose a WAV file</p>
        <input type="file" id="fileInput" accept=".wav">
      </div>
      <input type="text" id="songName" placeholder="Song name">
      <button class="submit-btn" id="uploadBtn" disabled>Upload &amp; Fingerprint</button>
      <div id="uploadStatus"></div>
    </div>
  </div>

  <div class="panel" id="panel-library">
    <div class="library-card">
      <div class="library-header">
        <h2>Stored Songs</h2>
        <button class="refresh-btn" id="refreshBtn">Refresh</button>
      </div>
      <ul class="song-list" id="songList"></ul>
      <div class="empty-state" id="emptyState">No songs in library yet</div>
    </div>
  </div>
</div>

<script>
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
  });
});

const fileInput = document.getElementById('fileInput');
const uploadArea = document.getElementById('uploadArea');
const songName = document.getElementById('songName');
const uploadBtn = document.getElementById('uploadBtn');
const uploadStatus = document.getElementById('uploadStatus');

uploadArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  uploadBtn.disabled = !fileInput.files.length || !songName.value.trim();
  if (fileInput.files.length) {
    uploadArea.querySelector('p').innerHTML = '<span class="filename">' + fileInput.files[0].name + '</span>';
  }
});
songName.addEventListener('input', () => {
  uploadBtn.disabled = !fileInput.files.length || !songName.value.trim();
});

uploadBtn.addEventListener('click', async () => {
  if (!fileInput.files.length || !songName.value.trim()) return;
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  formData.append('name', songName.value.trim());
  uploadBtn.disabled = true;
  uploadStatus.innerHTML = '<span class="spinner"></span> Processing...';
  try {
    const res = await fetch('/api/add-song', { method: 'POST', body: formData });
    const data = await res.json();
    uploadStatus.textContent = data.error ? 'Error: ' + data.error : 'Added "' + data.song + '"';
  } catch (e) {
    uploadStatus.textContent = 'Error: ' + e.message;
  }
  uploadBtn.disabled = false;
});

const listenBtn = document.getElementById('listenBtn');
const status = document.getElementById('status');
const resultCard = document.getElementById('resultCard');
const songNameResult = document.getElementById('songNameResult');
const confidenceResult = document.getElementById('confidenceResult');

let audioChunks = [];
let isRecording = false;

listenBtn.addEventListener('click', async () => {
  if (isRecording) return;

  resultCard.classList.remove('show');
  status.innerHTML = '<span class="spinner"></span> Accessing microphone...';

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(stream);
    const sampleRate = audioContext.sampleRate;

    const scriptNode = audioContext.createScriptProcessor(4096, 1, 1);
    const pcmChunks = [];

    source.connect(scriptNode);
    scriptNode.connect(audioContext.destination);
    scriptNode.onaudioprocess = (e) => {
      const channel = e.inputBuffer.getChannelData(0);
      pcmChunks.push(new Float32Array(channel));
    };

    listenBtn.classList.add('recording');
    listenBtn.querySelector('.label').textContent = 'Listening';
    listenBtn.querySelector('.icon').textContent = '🎤';
    status.textContent = 'Recording...';
    isRecording = true;

    await new Promise(resolve => setTimeout(resolve, 5000));

    source.disconnect();
    scriptNode.disconnect();
    stream.getTracks().forEach(t => t.stop());

    status.innerHTML = '<span class="spinner"></span> Converting...';

    let totalLen = pcmChunks.reduce((sum, c) => sum + c.length, 0);
    const pcmData = new Float32Array(totalLen);
    let offset = 0;
    for (const chunk of pcmChunks) {
      pcmData.set(chunk, offset);
      offset += chunk.length;
    }

    const numSamples = pcmData.length;
    const wavBuffer = new ArrayBuffer(44 + numSamples * 2);
    const view = new DataView(wavBuffer);

    function writeString(offset, str) {
      for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
    }
    writeString(0, 'RIFF');
    view.setUint32(4, 36 + numSamples * 2, true);
    writeString(8, 'WAVE');
    writeString(12, 'fmt ');
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);
    view.setUint16(22, 1, true);
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeString(36, 'data');
    view.setUint32(40, numSamples * 2, true);

    for (let i = 0; i < numSamples; i++) {
      let s = Math.max(-1, Math.min(1, pcmData[i]));
      view.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
    }

    const wavBlob = new Blob([wavBuffer], { type: 'audio/wav' });

    status.innerHTML = '<span class="spinner"></span> Matching...';

    const formData = new FormData();
    formData.append('file', wavBlob, 'recording.wav');
    const res = await fetch('/api/match', { method: 'POST', body: formData });
    const data = await res.json();

    listenBtn.classList.remove('recording');
    listenBtn.querySelector('.label').textContent = 'Start Listening';
    listenBtn.querySelector('.icon').textContent = '🎵';
    isRecording = false;

    if (data.error) {
      status.textContent = 'Error: ' + data.error;
    } else if (data.match) {
      resultCard.classList.add('show');
      songNameResult.textContent = data.match;
      confidenceResult.textContent = 'Identified';
      status.textContent = '';
    } else {
      status.textContent = 'No match found';
    }

  } catch (e) {
    listenBtn.classList.remove('recording');
    listenBtn.querySelector('.label').textContent = 'Start Listening';
    listenBtn.querySelector('.icon').textContent = '🎵';
    isRecording = false;
    status.textContent = 'Error: ' + (e.name === 'NotAllowedError' ? 'Microphone access denied' : e.message);
  }
});

const songList = document.getElementById('songList');
const emptyState = document.getElementById('emptyState');

async function loadLibrary() {
  try {
    const res = await fetch('/api/songs');
    const data = await res.json();
    if (data.songs && data.songs.length) {
      songList.innerHTML = data.songs.map((s, i) =>
        '<li><span class="num">' + (i+1) + '</span><span class="name">' + s + '</span></li>'
      ).join('');
      songList.style.display = '';
      emptyState.style.display = 'none';
    } else {
      songList.style.display = 'none';
      emptyState.style.display = '';
    }
  } catch (e) {
    songList.innerHTML = '<li>Error loading songs</li>';
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadLibrary);
document.querySelector('.tab[data-tab="library"]').addEventListener('click', () => setTimeout(loadLibrary, 100));
</script>
</body>
</html>
